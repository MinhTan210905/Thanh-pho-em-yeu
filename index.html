<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Khám phá TPHCM - Đại học Sư Phạm TP.HCM</title>
    <link rel="icon" href="/images/logo_truong_crop.png" type="image/x-icon" />
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="preconnect" href="https://translate.google.com" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
    />
    
    
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'vi', includedLanguages: 'vi,en' },
          'google_translate_element'
        );
      }
      // Lazy load Google Translate when DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          const script = document.createElement('script');
          script.type = 'text/javascript';
          script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
          script.async = true;
          document.body.appendChild(script);
        });
      } else {
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
        script.async = true;
        document.body.appendChild(script);
      }
    </script>
    <style>
      /* Ẩn toàn bộ giao diện Google Translate */
      .goog-te-gadget { display: none !important; }
      .goog-te-banner-frame { display: none !important; }
      .goog-te-balloon { display: none !important; }
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0 !important; }
      iframe.skiptranslate { display: none !important; }
      .goog-te-spinner-pos { display: none !important; }
      #goog-gt-tt { display: none !important; }
      .goog-logo-link { display: none !important; }
      .goog-te-gadget img { display: none !important; }
      .goog-te-gadget-simple { display: none !important; }
      .goog-te-menu-value { display: none !important; }
      #google_translate_element { display: none !important; visibility: hidden !important; }
      
      /* Ẩn logo và button Google Translate */
      .goog-te-gadget > span { display: none !important; }
      .goog-te-gadget > div { display: none !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .goog-text-highlight { background: none !important; box-shadow: none !important; }
      body > .goog-te-banner-frame.skiptranslate { display: none !important; }
      
      /* Force show root element */
      #root { display: block !important; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none;"></div>
    
    <!-- Loading Screen -->
    <div id="translate-loading" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); z-index: 999999; justify-content: center; align-items: center;">
      <div style="text-align: center;">
        <div id="spinner" style="width: 50px; height: 50px; margin: 0 auto;"></div>
      </div>
    </div>
    
    <style>
      /* Spinner Circle - Kiểu xoay 1: Xoay đều */
      @keyframes spin-smooth {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Spinner Circle - Kiểu xoay 2: Xoay nhanh dần */
      @keyframes spin-ease {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Spinner Circle - Kiểu xoay 3: Xoay ngược */
      @keyframes spin-reverse {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
      
      /* Spinner Circle - Kiểu xoay 4: Xoay nhấp nhô */
      @keyframes spin-bounce {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
      }
      
      .spinner-circle1 {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 107, 107, 0.2);
        border-top: 5px solid #ff6b6b;
        border-radius: 50%;
        animation: spin-smooth 0.8s linear infinite;
      }
      
      .spinner-circle2 {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 107, 107, 0.2);
        border-top: 5px solid #ff6b6b;
        border-right: 5px solid #ff6b6b;
        border-radius: 50%;
        animation: spin-ease 0.6s ease-in-out infinite;
      }
      
      .spinner-circle3 {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 107, 107, 0.2);
        border-left: 5px solid #ff6b6b;
        border-radius: 50%;
        animation: spin-reverse 0.7s linear infinite;
      }
      
      .spinner-circle4 {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255, 107, 107, 0.2);
        border-top: 5px solid #ff6b6b;
        border-bottom: 5px solid #ff6b6b;
        border-radius: 50%;
        animation: spin-bounce 1s ease-in-out infinite;
      }
    </style>
    
    <!-- Defer non-critical 3D library -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js" defer></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
